apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hurgelt-api
  namespace: hurgelt
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
spec:
  ingressClassName: nginx
  rules:
    - host: api.hurgelt.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hurgelt-api
                port:
                  number: 80
