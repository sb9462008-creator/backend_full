groups:
  - name: hurgelt-api
    rules:
      - alert: HurgeltApiDown
        expr: up{job="hurgelt-api"} == 0
        for: 1m
        labels:
          severity: critical
          service: hurgelt-api
        annotations:
          summary: Hurgelt API is down
          description: Prometheus has failed to scrape the Hurgelt API metrics endpoint for more than 1 minute.

      - alert: HurgeltHigh5xxErrorRate
        expr: |
          (
            sum(rate(app_http_requests_total{job="hurgelt-api",status_class="5xx"}[5m]))
            /
            clamp_min(sum(rate(app_http_requests_total{job="hurgelt-api"}[5m])), 0.001)
          ) > 0.05
        for: 5m
        labels:
          severity: warning
          service: hurgelt-api
        annotations:
          summary: Hurgelt API 5xx error rate is high
          description: More than 5% of API requests have been returning 5xx responses over the last 5 minutes.

      - alert: HurgeltHighP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (
              rate(app_http_request_duration_ms_bucket{job="hurgelt-api"}[5m])
            )
          ) > 1000
        for: 10m
        labels:
          severity: warning
          service: hurgelt-api
        annotations:
          summary: Hurgelt API p95 latency is high
          description: The p95 HTTP latency has been above 1000 ms for at least 10 minutes.

      - alert: HurgeltHighActiveRequests
        expr: app_active_requests{job="hurgelt-api"} > 75
        for: 10m
        labels:
          severity: warning
          service: hurgelt-api
        annotations:
          summary: Hurgelt API has too many in-flight requests
          description: The API has been handling more than 75 concurrent requests for at least 10 minutes.

      - alert: HurgeltHighMemoryUsage
        expr: process_resident_memory_bytes{job="hurgelt-api"} > 500000000
        for: 10m
        labels:
          severity: warning
          service: hurgelt-api
        annotations:
          summary: Hurgelt API memory usage is high
          description: Resident memory has exceeded 500 MB for at least 10 minutes.

      - alert: HurgeltApplicationErrorsBurst
        expr: increase(app_application_errors_total{job="hurgelt-api"}[10m]) > 20
        for: 5m
        labels:
          severity: warning
          service: hurgelt-api
        annotations:
          summary: Hurgelt API application error volume is rising
          description: More than 20 application errors have been recorded in the last 10 minutes.
