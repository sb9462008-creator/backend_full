route:
  receiver: default-receiver
  group_by: ["alertname", "service", "severity"]
  group_wait: 15s
  group_interval: 1m
  repeat_interval: 4h

receivers:
  - name: default-receiver

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ["alertname", "service"]
